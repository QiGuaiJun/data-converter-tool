<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>定时任务 - 数据导表工具</title>
    <link rel="stylesheet" href="/styles.css?v=20260714_sidebar_palette" />
  </head>
  <body data-page="schedule">
    <div class="desktop-shell">
      <header class="app-ribbon">
        <a class="ribbon-item" href="/connections.html"><span class="ribbon-icon green">DB</span><span>新建连接</span></a>
        <a class="ribbon-item" href="/"><span class="ribbon-icon orange">IN</span><span>导入</span></a>
        <a class="ribbon-item" href="/export.html"><span class="ribbon-icon cyan">OUT</span><span>导出</span></a>
        <a class="ribbon-item" href="/sync.html"><span class="ribbon-icon red">SYNC</span><span>同步</span></a>
        <a class="ribbon-item" href="/query.html"><span class="ribbon-icon dark">SQL</span><span>查询</span></a>
        <a class="ribbon-item" href="/tables.html"><span class="ribbon-icon blue">TAB</span><span>表</span></a>
        <a class="ribbon-item" href="/jobs.html"><span class="ribbon-icon teal">JOB</span><span>作业</span></a>
        <a class="ribbon-item active" href="/schedule.html"><span class="ribbon-icon purple">TIME</span><span>定时任务</span></a>
        <a class="ribbon-item" href="/api.html"><span class="ribbon-icon black">API</span><span>API</span></a>
      </header>

      <div class="desktop-main">
        <aside class="app-sidebar">
          <div class="sidebar-title">功能</div>
          <nav class="module-tree">
            <a class="tree-node" href="/connections.html"><span>DB</span> 新建连接</a>
            <a class="tree-node" href="/"><span>IN</span> 导入</a>
            <a class="tree-node" href="/export.html"><span>OUT</span> 导出</a>
            <a class="tree-node" href="/sync.html"><span>SYNC</span> 同步</a>
            <a class="tree-node" href="/query.html"><span>SQL</span> 查询</a>
            <a class="tree-node" href="/tables.html"><span>TAB</span> 表</a>
            <a class="tree-node" href="/jobs.html"><span>JOB</span> 作业</a>
            <a class="tree-node active" href="/schedule.html"><span>TIME</span> 定时任务</a>
          </nav>
        </aside>

        <section class="app-workspace">
          <main class="schedule-desktop-page">
            <div class="schedule-tab-title">
              <span class="schedule-tab-icon">TIME</span>
              <span>定时任务</span>
              <div class="schedule-live-refresh">
                <span id="lastRefreshTime">刷新时间 · --:--:--</span>
                <button id="refreshSchedules" type="button" title="立即刷新"><span class="refresh-icon">↻</span><span>刷新</span></button>
              </div>
            </div>

            <section class="schedule-desktop-toolbar">
              <button id="editSchedule" type="button" disabled>编辑任务</button>
              <button id="newSchedule" type="button">新增任务</button>
              <button id="deleteSchedule" type="button" disabled>删除任务</button>
              <button id="startSchedule" type="button" disabled>启用任务</button>
              <button id="pauseSchedule" type="button" disabled>禁用任务</button>
              <button id="viewScheduleLog" type="button" disabled>查看日志</button>
              <button id="runScheduleNow" type="button" disabled>立即运行</button>
              <span id="scheduleStatus"></span>
            </section>

            <section class="schedule-table-wrap">
              <table class="schedule-table">
                <thead>
                  <tr>
                    <th>名称</th>
                    <th>状态</th>
                    <th>触发器</th>
                    <th>下次运行时间</th>
                    <th>上次运行时间</th>
                    <th>上次运行结果</th>
                  </tr>
                </thead>
                <tbody id="scheduleTableBody">
                  <tr><td colspan="6" class="schedule-empty">正在加载定时任务...</td></tr>
                </tbody>
              </table>
            </section>
          </main>
        </section>
      </div>
    </div>

    <dialog id="scheduleDialog" class="schedule-dialog">
      <form method="dialog" class="schedule-task-card">
        <header>
          <strong id="scheduleDialogTitle">新增任务</strong>
          <button id="closeScheduleDialog" type="button" aria-label="关闭">×</button>
        </header>

        <label class="schedule-name-line">任务名称：<input id="scheduleName" /></label>

        <fieldset class="task-type-row">
          <legend>选择要添加的子任务类型：</legend>
          <label><input type="radio" name="stepType" value="import" checked /> 导入</label>
          <label><input type="radio" name="stepType" value="export" /> 导出</label>
          <label class="disabled"><input type="radio" name="stepType" value="sync" disabled /> 同步</label>
          <label><input type="radio" name="stepType" value="query" /> 查询</label>
          <label><input type="radio" name="stepType" value="job" /> 作业</label>
        </fieldset>

        <label class="connection-line">选择连接：<select id="scheduleConnection"></select></label>

        <section class="schedule-picker">
          <div class="picker-box">
            <div id="stepConfig" class="step-config"></div>
          </div>
          <div class="picker-actions">
            <button id="addStep" type="button">&gt;&gt;</button>
            <button id="removeStep" type="button">&lt;&lt;</button>
            <button id="moveStepUp" type="button">↑</button>
            <button id="moveStepDown" type="button">↓</button>
          </div>
          <div class="picker-box">
            <div id="selectedSteps" class="selected-steps"></div>
          </div>
        </section>

        <section class="schedule-plan">
          <div class="plan-label">计划在</div>
          <label>开始时间：<input id="scheduleStart" type="datetime-local" step="1" /></label>
          <label>结束时间：<input id="scheduleEnd" type="datetime-local" step="1" value="2099-12-31T23:59:59" /></label>
          <button id="openScheduleAssistant" type="button">定时设置助手</button>
          <div id="ruleSummary" class="rule-summary">每 1 小时轮询</div>
        </section>

        <section class="retention-row">
          <label><input id="keepLogs" type="checkbox" /> 保留最近</label>
          <input id="logRetentionDays" type="number" min="1" value="3" />
          <span>天的日志</span>
          <label><input id="emailOnFail" type="checkbox" disabled /> 任务失败时发送邮件提醒</label>
        </section>

        <footer>
          <button id="saveSchedule" class="primary" type="button">确认</button>
          <button id="cancelSchedule" type="button">取消</button>
        </footer>
      </form>
    </dialog>

    <dialog id="assistantDialog" class="schedule-dialog">
      <form method="dialog" class="schedule-assistant-card">
        <header>
          <strong>定时设置助手</strong>
          <button id="closeAssistant" type="button" aria-label="关闭">×</button>
        </header>
        <fieldset class="assistant-mode-row">
          <legend>定时方式：</legend>
          <label><input type="radio" name="assistantMode" value="interval" checked /> 轮询</label>
          <label><input type="radio" name="assistantMode" value="fixed" /> 定时</label>
        </fieldset>
        <section id="assistantIntervalPanel" class="assistant-panel">
          <label>轮询时间间隔：<input id="assistantAmount" type="number" min="1" value="1" /></label>
          <select id="assistantUnit">
            <option value="seconds">秒</option>
            <option value="minutes">分钟</option>
            <option value="hours" selected>小时</option>
            <option value="days">天</option>
          </select>
        </section>
        <section id="assistantFixedPanel" class="assistant-panel hidden">
          <select id="assistantFixedMode">
            <option value="daily">每天</option>
            <option value="weekly">每周</option>
            <option value="monthly">每月</option>
            <option value="yearly">每年</option>
          </select>
          <span>的</span>
          <input id="assistantTime" type="time" step="1" value="09:00:00" />
        </section>
        <footer>
          <button id="applyAssistant" class="primary" type="button">设置</button>
          <button id="cancelAssistant" type="button">取消</button>
        </footer>
      </form>
    </dialog>

    <dialog id="logDialog" class="schedule-dialog">
      <form method="dialog" class="schedule-log-card">
        <header>
          <strong>运行日志</strong>
          <button id="closeLogDialog" type="button" aria-label="关闭">×</button>
        </header>
        <div id="scheduleRuns" class="schedule-run-list">暂无日志</div>
        <footer>
          <button id="closeLogFooter" type="button">关闭</button>
        </footer>
      </form>
    </dialog>

    <script src="/schedule.js?v=20260714_refresh_time_label"></script>
  </body>
</html>
